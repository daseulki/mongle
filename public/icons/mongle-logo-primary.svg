    <ellipse cx="56" cy="88" rx="6.5" ry="4" fill="#F4A48B" opacity="0.55"/>
    <ellipse cx="108" cy="88" rx="6.5" ry="4" fill="#F4A48B" opacity="0.55"/>

    <ellipse cx="68" cy="78" rx="3" ry="4" fill="#2C2416"/>
    <ellipse cx="96" cy="78" rx="3" ry="4" fill="#2C2416"/>
    <circle cx="69.2" cy="76.5" r="0.9" fill="#FFFFFF"/>
    <circle cx="97.2" cy="76.5" r="0.9" fill="#FFFFFF"/>

    <path d="M 74 92 Q 82 99 90 92" fill="none" stroke="#2C2416" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <text x="160" y="210" text-anchor="middle" class="ko">몽글여행</text>

  <line x1="120" y1="226" x2="148" y2="226" stroke="#C4813A" stroke-width="1.5" opacity="0.5"/>
  <circle cx="160" cy="226" r="2.5" fill="#C4813A"/>
  <line x1="172" y1="226" x2="200" y2="226" stroke="#C4813A" stroke-width="1.5" opacity="0.5"/>

  <text x="160" y="250" text-anchor="middle" class="en">Mongle Trip</text>
