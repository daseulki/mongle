<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <title>몽글여행 메인 로고</title>
  <desc>몽글이 마스코트 + 몽글여행 워드마크 + Mongle Trip 영문</desc>

  <style>
    @font-face {
      font-family: 'KyoboHand';
      src: url('./KyoboHandwriting.woff2') format('woff2');
      font-display: swap;
    }
    .ko { font-family: 'KyoboHand', cursive; font-size: 56px; fill: #2C2416; }
    .en { font-family: 'KyoboHand', cursive; font-size: 22px; fill: #C4813A; letter-spacing: 1px; }
  </style>

  <g transform="translate(95, 20)">
    <text x="22" y="22" fill="#C4813A" style="font:bold 16px serif;">✦</text>
    <text x="138" y="32" fill="#E8C07A" style="font:bold 12px serif;">✧</text>

    <g transform="translate(140, 24) rotate(-12)">
