# Supabase 프로젝트 로컬 개발 설정
# 수정 후 `supabase start` 재시작 필요
# project_id 는 `supabase link` 후 자동 채워짐

project_id = "hrwwkatzlkhbzhlkwrbn"

[api]
enabled     = true
port        = 54321
schemas     = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows    = 1000

[db]
port         = 54322
shadow_port  = 54320
major_version = 15

[studio]
enabled  = true
port     = 54323
api_url  = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port    = 54324

[storage]
enabled         = true
file_size_limit = "50MiB"

[auth]
enabled           = true
site_url          = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry        = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval  = 10
enable_signup     = true
enable_anonymous_sign_ins = false

[auth.external.google]
enabled      = true
client_id    = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret       = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
redirect_uri = ""

[edge_runtime]
enabled     = true
policy      = "oneshot"
inspector_port = 8083

# ─── Edge Functions 설정 ─────────────────────────────────────────────────────

[functions.check-storage]
enabled = true

[functions.fetch-weather]
enabled = true

# 스케줄 설정은 CLI config.toml에서 지원하지 않음.
# → supabase/migrations/0006_cron_cleanup.sql 의 pg_cron 방식 사용
[functions.cleanup-deleted-albums]
enabled = true
